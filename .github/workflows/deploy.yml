name: Deploy — Addons → mobilsoft.net

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Sunucuya Addons Deploy
    runs-on: ubuntu-latest

    steps:
      - name: SSH ile git pull + Odoo restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export PATH=$PATH:/usr/bin:/usr/local/bin
            cd /home/joker/mobilsoft-odoo-addons && git pull origin main
            /usr/bin/docker compose -f /home/joker/Joker/docker-compose.yml restart odoo
            echo "Deploy OK: $(date)"
